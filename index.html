<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SözLab – Dilini İnkişaf Etdir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --card: #16161f;
  --card2: #1c1c28;
  --border: #2a2a3a;
  --border2: #333348;
  --text: #e8e8f0;
  --muted: #6b6b85;
  --gold: #f0c040;
  --gold2: #c89820;
  --teal: #40d9c0;
  --purple: #9B72CF;
  --purple2: #7a55a8;
  --red: #e05555;
  --green: #40c080;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden}

/* ── CANVAS BG ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── APP SHELL ── */
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex:1;overflow:hidden}
.screen.active{display:flex;flex-direction:column}

/* ── LOADING ── */
#loadingOverlay{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s;
}
#loadingOverlay.hidden{opacity:0;pointer-events:none}
.load-logo{font-family:var(--font-head);font-size:2.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.load-spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN SCREEN ── */
#loginScreen{
  align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 30% 20%, #1a1030 0%, transparent 60%),
             radial-gradient(ellipse at 70% 80%, #0a2020 0%, transparent 60%);
}
.login-card{
  width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:36px 32px;display:flex;flex-direction:column;gap:14px;
  box-shadow:0 24px 80px #0008;position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, #9B72CF18 0%, transparent 60%);
  pointer-events:none;
}
.login-logo{font-family:var(--font-head);font-size:2rem;font-weight:800;text-align:center;
  background:linear-gradient(135deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-tagline{text-align:center;color:var(--muted);font-size:.85rem;margin-top:-6px}
.feat-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.feat-pill{background:var(--card2);border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:.75rem;color:var(--muted)}
.login-tabs{display:flex;background:var(--bg2);border-radius:var(--radius-sm);padding:4px;gap:4px}
.login-tab{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);
  border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:.9rem;transition:.2s}
.login-tab.active{background:var(--card2);color:var(--text);font-weight:600}
.login-input{
  padding:13px 16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:.95rem;font-family:var(--font-body);
  outline:none;transition:.2s;
}
.login-input:focus{border-color:var(--purple);background:var(--card2)}
.login-input::placeholder{color:var(--muted)}
.btn-primary{
  padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:var(--radius-sm);color:#111;font-weight:700;
  font-size:1rem;font-family:var(--font-head);cursor:pointer;transition:.15s;
}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-divider{text-align:center;color:var(--muted);font-size:.8rem;position:relative}
.login-divider::before,.login-divider::after{
  content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);
}
.login-divider::before{left:0}.login-divider::after{right:0}
.btn-admin{
  padding:13px;background:transparent;border:1px solid var(--purple);
  border-radius:var(--radius-sm);color:var(--purple);font-weight:600;
  font-size:.95rem;font-family:var(--font-body);cursor:pointer;transition:.2s;
}
.btn-admin:hover{background:var(--purple);color:#fff}
.login-stats{display:flex;justify-content:center;gap:0;margin-top:4px}
.l-stat{flex:1;text-align:center}
.l-stat .num{font-family:var(--font-head);font-size:1.3rem;font-weight:700;color:var(--gold)}
.l-stat .lbl{font-size:.7rem;color:var(--muted)}
.l-div{width:1px;background:var(--border);margin:4px 0}

/* ── MAIN DASHBOARD ── */
#mainDashboard{flex-direction:column}
.top-bar{
  display:flex;align-items:center;padding:14px 20px;gap:12px;
  background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;
}
.top-logo{font-family:var(--font-head);font-weight:800;font-size:1.2rem;
  background:linear-gradient(135deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex:1;
}
.top-stat{display:flex;align-items:center;gap:5px;font-size:.85rem;color:var(--muted)}
.top-stat span{color:var(--gold);font-weight:700;font-family:var(--font-head)}
.avatar-btn{
  width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1rem;color:#fff;font-family:var(--font-head);flex-shrink:0;
}
.main-content{flex:1;overflow-y:auto;padding:16px 20px 100px}
.bottom-nav{
  display:flex;background:var(--card);border-top:1px solid var(--border);
  padding:8px 4px;flex-shrink:0;position:sticky;bottom:0;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 2px;border:none;background:transparent;color:var(--muted);
  cursor:pointer;transition:.15s;border-radius:var(--radius-sm);font-family:var(--font-body);
}
.nav-btn.active{color:var(--gold)}
.nav-btn .icon{font-size:1.2rem}
.nav-btn .lbl{font-size:.65rem}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}

/* ── HOME VIEW ── */
.section-title{font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--text)}
.daily-card{
  background:linear-gradient(135deg,#1a1028,#0f2020);
  border:1px solid var(--border2);border-radius:var(--radius);padding:20px;
  margin-bottom:16px;position:relative;overflow:hidden;
}
.daily-card::before{
  content:'📖';position:absolute;right:16px;top:16px;font-size:2.5rem;opacity:.15;
}
.daily-label{font-size:.7rem;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.daily-word{font-family:var(--font-head);font-size:1.6rem;font-weight:800;color:var(--text);margin-bottom:4px}
.daily-meaning{color:var(--muted);font-size:.9rem;margin-bottom:12px}
.daily-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag{background:var(--card2);border:1px solid var(--border);border-radius:20px;
  padding:3px 10px;font-size:.72rem;color:var(--muted)}
.btn-sm{
  padding:9px 18px;border:none;border-radius:var(--radius-sm);cursor:pointer;
  font-family:var(--font-body);font-size:.85rem;font-weight:600;transition:.15s;
}
.btn-teal{background:var(--teal);color:#0a1a18}
.btn-teal:hover{filter:brightness(1.1)}
.announce-card{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;border-left:3px solid var(--gold);
}
.announce-card.success{border-left-color:var(--green)}
.announce-card.warning{border-left-color:#e09040}
.announce-card.promo{border-left-color:var(--purple)}
.announce-title{font-weight:600;font-size:.9rem;margin-bottom:4px}
.announce-body{color:var(--muted);font-size:.82rem;line-height:1.5}
.announce-date{color:var(--muted);font-size:.7rem;margin-top:6px}

/* ── XP BAR ── */
.xp-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:16px}
.xp-row{display:flex;justify-content:space-between;margin-bottom:8px;align-items:center}
.xp-label{font-size:.85rem;color:var(--muted)}
.xp-val{font-family:var(--font-head);font-weight:700;color:var(--gold)}
.xp-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:width .5s ease}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;text-align:center}
.stat-card .val{font-family:var(--font-head);font-size:1.4rem;font-weight:800;color:var(--gold)}
.stat-card .lbl{font-size:.7rem;color:var(--muted);margin-top:2px}

/* ── GAMES VIEW ── */
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.game-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 14px;text-align:center;cursor:pointer;transition:.2s;
}
.game-card:hover{border-color:var(--purple);transform:translateY(-2px)}
.game-icon{font-size:2rem;margin-bottom:8px}
.game-name{font-family:var(--font-head);font-weight:700;font-size:.9rem;margin-bottom:4px}
.game-desc{font-size:.75rem;color:var(--muted)}
.game-xp{font-size:.7rem;color:var(--gold);margin-top:6px;font-weight:600}

/* QUIZ */
.quiz-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.quiz-q{font-size:1.1rem;font-weight:600;margin-bottom:18px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{
  padding:12px 16px;background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius-sm);cursor:pointer;transition:.2s;font-size:.9rem;text-align:left;
  color:var(--text);font-family:var(--font-body);
}
.quiz-opt:hover{border-color:var(--purple)}
.quiz-opt.correct{background:#1a3a2a;border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.quiz-result{text-align:center;padding:20px;font-size:1.1rem;font-weight:600}

/* FILL BLANK */
.fill-input{
  width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--text);font-size:1rem;font-family:var(--font-body);
  outline:none;margin:12px 0;
}
.fill-input:focus{border-color:var(--teal)}

/* ── VOCAB VIEW ── */
.vocab-search{
  width:100%;padding:12px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:.9rem;font-family:var(--font-body);
  outline:none;margin-bottom:12px;
}
.vocab-search:focus{border-color:var(--purple)}
.word-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.2s;
}
.word-card:hover{border-color:var(--border2)}
.word-card.learned{border-left:3px solid var(--green)}
.word-en{font-family:var(--font-head);font-weight:700;font-size:1rem}
.word-az{color:var(--muted);font-size:.85rem;margin-top:2px}
.word-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.word-card.open .word-detail{display:block}
.word-ex{font-size:.82rem;color:var(--muted);font-style:italic;margin-bottom:8px}
.btn-learn{
  padding:7px 14px;background:var(--green);border:none;border-radius:8px;
  color:#0a1a10;font-weight:600;font-size:.8rem;cursor:pointer;
}
.btn-learned{background:var(--card2);border:1px solid var(--green);color:var(--green)}

/* ── CREATIVE VIEW ── */
.story-prompt{
  background:linear-gradient(135deg,#1a1028,#0f1a28);border:1px solid var(--border2);
  border-radius:var(--radius);padding:16px;margin-bottom:14px;
}
.story-prompt-label{font-size:.7rem;color:var(--purple);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.story-prompt-text{font-size:.95rem;font-weight:500}
textarea.story-area{
  width:100%;min-height:130px;padding:14px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:.9rem;
  outline:none;resize:vertical;line-height:1.6;margin-bottom:10px;
}
textarea.story-area:focus{border-color:var(--purple)}
.story-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;
}
.story-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.story-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.story-author{font-weight:600;font-size:.85rem}
.story-date{font-size:.72rem;color:var(--muted);margin-left:auto}
.story-text{font-size:.88rem;line-height:1.6;color:var(--text)}
.story-footer{display:flex;justify-content:flex-end;margin-top:8px}
.like-btn{background:transparent;border:1px solid var(--border);border-radius:20px;
  padding:4px 12px;color:var(--muted);cursor:pointer;font-size:.8rem;transition:.15s}
.like-btn:hover{border-color:var(--red);color:var(--red)}

/* ── LEADERBOARD VIEW ── */
.lb-row{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;
}
.lb-row.me{border-color:var(--gold);background:#1a1508}
.lb-rank{font-family:var(--font-head);font-weight:800;font-size:1rem;width:28px;text-align:center;color:var(--muted)}
.lb-rank.top1{color:#FFD700}.lb-rank.top2{color:#C0C0C0}.lb-rank.top3{color:#CD7F32}
.lb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
.lb-name{flex:1;font-weight:600;font-size:.9rem}
.lb-xp{font-family:var(--font-head);font-weight:700;color:var(--gold)}

/* ── PROFILE VIEW ── */
.profile-header{
  background:linear-gradient(135deg,#1a1028,#0f2020);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px;
}
.profile-big-av{
  width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;
  color:#fff;margin:0 auto 12px;font-family:var(--font-head);
}
.profile-name{font-family:var(--font-head);font-size:1.3rem;font-weight:800}
.profile-level{color:var(--gold);font-size:.85rem;margin-top:4px}
.profile-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.profile-section h3{font-family:var(--font-head);font-size:.9rem;margin-bottom:12px;color:var(--muted)}
.profile-input{
  width:100%;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:.9rem;
  outline:none;margin-bottom:10px;
}
.profile-input:focus{border-color:var(--purple)}
.btn-danger{padding:10px 18px;background:transparent;border:1px solid var(--red);
  border-radius:var(--radius-sm);color:var(--red);cursor:pointer;font-family:var(--font-body);font-size:.85rem}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-outline{padding:10px 18px;background:transparent;border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--text);cursor:pointer;font-family:var(--font-body);font-size:.85rem}
.btn-outline:hover{border-color:var(--text)}

/* ── AI VIEW ── */
.ai-chat{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;min-height:200px}
.ai-msg{max-width:85%;padding:12px 14px;border-radius:14px;font-size:.88rem;line-height:1.6}
.ai-msg.user{align-self:flex-end;background:var(--purple2);color:#fff;border-bottom-right-radius:4px}
.ai-msg.bot{align-self:flex-start;background:var(--card2);border:1px solid var(--border);border-bottom-left-radius:4px}
.ai-input-row{display:flex;gap:8px}
.ai-input{
  flex:1;padding:12px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:.9rem;outline:none;
}
.ai-input:focus{border-color:var(--purple)}
.ai-send{padding:12px 16px;background:var(--purple);border:none;border-radius:var(--radius-sm);
  color:#fff;cursor:pointer;font-size:1rem}

/* ── ADMIN SCREEN ── */
#adminScreen{background:var(--bg2)}
.admin-bar{
  display:flex;align-items:center;padding:14px 20px;gap:12px;
  background:var(--card);border-bottom:1px solid var(--border);
}
.admin-title{font-family:var(--font-head);font-weight:800;font-size:1.1rem;flex:1;color:var(--purple)}
.admin-content{flex:1;overflow-y:auto;padding:16px 20px 80px}
.admin-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.admin-tab{
  padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:20px;
  color:var(--muted);cursor:pointer;font-size:.85rem;white-space:nowrap;font-family:var(--font-body);transition:.15s;
}
.admin-tab.active{background:var(--purple);border-color:var(--purple);color:#fff}
.admin-stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.admin-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.admin-stat .val{font-family:var(--font-head);font-size:1.5rem;font-weight:800;color:var(--purple)}
.admin-stat .lbl{font-size:.72rem;color:var(--muted)}
.admin-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.admin-section h3{font-family:var(--font-head);font-size:.9rem;margin-bottom:12px;color:var(--muted)}
.admin-input{
  width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:.88rem;
  outline:none;margin-bottom:8px;
}
.admin-input:focus{border-color:var(--purple)}
.type-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.type-btn{padding:5px 12px;background:var(--card2);border:1px solid var(--border);border-radius:20px;
  color:var(--muted);cursor:pointer;font-size:.78rem;font-family:var(--font-body);transition:.15s}
.type-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.admin-user-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px}
.admin-user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.admin-user-name{flex:1;font-size:.85rem;font-weight:600}
.admin-user-xp{font-size:.78rem;color:var(--gold)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--border2);color:var(--text);
  padding:10px 20px;border-radius:20px;font-size:.85rem;opacity:0;
  transition:.3s;pointer-events:none;z-index:999;white-space:nowrap;
  box-shadow:0 8px 32px #0008;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SCROLLBAR ── */

function showToast(msg,color='gold'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=`var(--${color})`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function showScreen(id){

function xpForLevel(lvl){return lvl*100;}
function levelFromXP(xp){let l=1;while(xp>=xpForLevel(l))xp-=xpForLevel(l++);return l;}

// ══════════════════════════════════════════════════════
// BACKGROUND CANVAS
// ══════════════════════════════════════════════════════
(function initCanvas(){
  const c=document.getElementById('bgCanvas');
  const ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;pts=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5}));}
  resize();window.addEventListener('resize',resize);
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(155,114,207,.4)';ctx.fill();
    });
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(155,114,207,${.15*(1-d/120)})`;ctx.stroke();}
    }));
    requestAnimationFrame(draw);
  }draw();
})();

async function getProfile(username){
  try{
    const {data}=await sb.from('profiles').select().eq('username',username).single();
    return data||null;
  }catch(e){return null;}
}
async function createProfile(username){
  try{
    const {data}=await sb.from('profiles').insert([{
      username,display_name:username,xp:0,level:1,streak:0,
      learned:[],last_visit:new Date().toDateString()
    }]).select().single();
    return data||null;
  }catch(e){return null;}
}
async function saveProfile(updates){
  if(!currentUser)return;
  try{await sb.from('profiles').update(updates).eq('username',currentUser.username);}catch(e){}
}
async function addXP(amount,reason=''){
  if(!currentUser)return;
  currentUser.xp+=amount;
  currentUser.level=levelFromXP(currentUser.xp);
  showToast(`+${amount} XP ${reason}`,'gold');
  updateTopBar();
  await saveProfile({xp:currentUser.xp,level:currentUser.level});
}
async function updateStreak(){
  if(!currentUser)return;
  const today=new Date().toDateString();
  if(currentUser.last_visit===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  currentUser.streak=currentUser.last_visit===yesterday?currentUser.streak+1:1;
  currentUser.last_visit=today;
  await saveProfile({streak:currentUser.streak,last_visit:today});
}

  let h=0;for(let c of seed)h=(h*31+c.charCodeAt(0))>>>0;
  dailyWord=WORDS[h%WORDS.length];
}

async function doLogin(){
  const username=document.getElementById('studentName').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!username||username.length<2){showToast('Ən az 2 simvol daxil edin!','red');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Yüklənir...';
  try{
    let profile=await getProfile(username);
    if(loginMode==='login'){
      if(!profile){showToast('Bu ad tapılmadı. Qeydiyyatdan keçin!','red');return;}
    } else {
      if(profile){showToast('Bu ad artıq mövcuddur!','red');return;}
      profile=await createProfile(username);
      if(!profile){showToast('Qeydiyyat xətası!','red');return;}
    }
    currentUser=profile;
    await updateStreak();
    dailyClaimed=localStorage.getItem('dc_'+username)===new Date().toDateString();
    showScreen('mainDashboard');
    updateTopBar();
    switchView('Home');
    renderHome();
    showToast(`Xoş gəldin, ${currentUser.display_name}! 👋`,'gold');
  }catch(e){showToast('Xəta baş verdi!','red');console.error(e);}
  finally{btn.disabled=false;btn.textContent='🚀 Daxil Ol';}
}

  div.innerHTML=data.map(a=>`
    <div class="announce-card ${a.type||'info'}">

      <div class="announce-body">${a.content}</div>
      <div class="announce-date">${new Date(a.created_at).toLocaleString('az-AZ')}</div>

}

function startGame(type){

// MATCH GAME
function startMatch(v){
  const pool=[...WORDS].sort(()=>Math.random()-.5).slice(0,5);
  let selLeft=null,selRight=null,matched=0,attempts=0;
  const lefts=[...pool].sort(()=>Math.random()-.5);
  const rights=[...pool].sort(()=>Math.random()-.5);
  function render(){
    v.innerHTML=`<button class="btn-outline" id="mback" style="margin-bottom:16px">← Oyunlar</button>
      <div class="section-title">Uyğun cütü tap</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>${lefts.map((w,i)=>`<div class="quiz-opt" data-li="${i}" style="margin-bottom:6px;${w._matched?'opacity:.3':''}">${w.en}</div>`).join('')}</div>
        <div>${rights.map((w,i)=>`<div class="quiz-opt" data-ri="${i}" style="margin-bottom:6px;${w._matched?'opacity:.3':''}">${w.az}</div>`).join('')}</div>
      </div>`;
    document.getElementById('mback').onclick=gameBack;
    v.querySelectorAll('[data-li]').forEach(b=>b.addEventListener('click',function(){
      if(lefts[this.dataset.li]._matched)return;
      v.querySelectorAll('[data-li]').forEach(x=>x.style.borderColor='');
      selLeft=+this.dataset.li;this.style.borderColor='var(--purple)';
      checkMatch();
    }));
    v.querySelectorAll('[data-ri]').forEach(b=>b.addEventListener('click',function(){
      if(rights[this.dataset.ri]._matched)return;
      v.querySelectorAll('[data-ri]').forEach(x=>x.style.borderColor='');
      selRight=+this.dataset.ri;this.style.borderColor='var(--teal)';
      checkMatch();
    }));
  }
  function checkMatch(){
    if(selLeft===null||selRight===null)return;
    attempts++;
    if(lefts[selLeft].en===rights[selRight].en){
      lefts[selLeft]._matched=rights[selRight]._matched=true;
      matched++;selLeft=selRight=null;
      if(matched===pool.length){
        setTimeout(async()=>{
          v.innerHTML=`<div class="quiz-box"><div class="quiz-result">🎉 Hamısını tapdın!<br>+10 XP!</div></div>`;
          await addXP(10,'– Uyğunlaşdır');
          setTimeout(gameBack,1500);
        },300);return;
      }
    } else {selLeft=selRight=null;}
    render();
  }
  render();
}

// CONFETTI
function spawnConfetti(){
  const colors=['var(--gold)','var(--teal)','var(--purple)','var(--red)','var(--green)'];
  for(let i=0;i<28;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;width:9px;height:9px;border-radius:2px;top:-10px;z-index:999;pointer-events:none;
      left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};
      animation:confettiFall ${2+Math.random()}s linear ${Math.random()*0.4}s forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3200);
  }
  if(!document.getElementById('confettiStyle')){
    const s=document.createElement('style');
    s.id='confettiStyle';
    s.textContent='@keyframes confettiFall{to{top:110vh;transform:translateX(80px) rotate(720deg);opacity:0}}';
    document.head.appendChild(s);
  }
}

function renderWordList(q){
  const list=document.getElementById('wordList');
  if(!list)return;
  const filtered=WORDS.filter(w=>w.en.toLowerCase().includes(q.toLowerCase())||w.az.toLowerCase().includes(q.toLowerCase()));
  list.innerHTML=filtered.map(w=>{
    const learned=(currentUser.learned||[]).includes(w.en);
    return`<div class="word-card${learned?' learned':''}" data-en="${w.en}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="word-en">${w.en}</div><div class="word-az">${w.az}</div></div>
        <div class="tag">${w.tags[0]}</div>
      </div>
      <div class="word-detail">
        <div class="word-ex">"${w.ex}"</div>
        <button class="btn-learn${learned?' btn-learned':''}" data-wrd="${w.en}">${learned?'✅ Öyrənildi':'📌 Öyrəndim'}</button>
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.word-card').forEach(c=>c.addEventListener('click',function(e){
    if(e.target.classList.contains('btn-learn'))return;
    this.classList.toggle('open');
  }));
  list.querySelectorAll('.btn-learn').forEach(b=>b.addEventListener('click',async function(e){
    e.stopPropagation();
    const wrd=this.dataset.wrd;
    if(!(currentUser.learned||[]).includes(wrd)){
      currentUser.learned=[...(currentUser.learned||[]),wrd];
      await saveProfile({learned:currentUser.learned});
      await addXP(2,'– Yeni söz');
      renderWordList(document.getElementById('vocabSearch')?.value||'');
    }
  }));
}

    <div class="section-title">🤖 Fərdi AI Müəllim</div>
    <div class="ai-chat" id="aiChat">
      <div class="ai-msg bot">Salam! Mən SözLab AI-yəm. İngilis dili haqqında istənilən sualı soruşun — söz mənası, qrammatika, cümlə nümunəsi. 😊</div>
    </div>
    <div class="ai-input-row">
      <input class="ai-input" id="aiInput" placeholder="Sualınızı yazın...">
      <button class="ai-send" id="aiSendBtn">➤</button>
    </div>
  `;
  const send=async()=>{
    const inp=document.getElementById('aiInput');
    const msg=inp.value.trim();
    if(!msg)return;
    inp.value='';
    addAIMsg(msg,'user');
    aiHistory.push({role:'user',content:msg});
    const thinking=addAIMsg('...','bot');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:400,
          system:`Sən SözLab platformasının AI ingilis dili müəllimisin. İstifadəçi Azərbaycan dilli tələbədir. Qısa, sadə, faydalı cavablar ver. Sözlər üçün mütləq nümunə cümlə ver.`,
          messages:aiHistory
        })
      });
      const d=await res.json();
      const reply=d.content?.[0]?.text||'Cavab alına bilmədi.';
      aiHistory.push({role:'assistant',content:reply});
      thinking.textContent=reply;
    }catch(e){thinking.textContent='Xəta baş verdi. Yenidən cəhd edin.';}
    document.getElementById('aiChat')?.scrollTo(0,9999);
  };
  function addAIMsg(text,role){
    const chat=document.getElementById('aiChat');
    const d=document.createElement('div');
    d.className=`ai-msg ${role}`;d.textContent=text;
    chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;
  }
  document.getElementById('aiSendBtn').addEventListener('click',send);
  document.getElementById('aiInput').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
}

async function openAdmin(){
  showScreen('adminScreen');
  loadAdminStats();
}
async function loadAdminStats(){
  let uc=0,sc=0,ac=0;
  try{const r=await sb.from('profiles').select('id',{count:'exact',head:true});if(r.count!==undefined)uc=r.count;}catch(e){}
  try{const r=await sb.from('stories').select('id',{count:'exact',head:true});if(r.count!==undefined)sc=r.count;}catch(e){}
  const today=new Date().toDateString();
  try{const r=await sb.from('profiles').select('id').eq('last_visit',today);ac=r.data?.length||0;}catch(e){}
  document.getElementById('aStatUsers').textContent=uc;
  document.getElementById('aStatStories').textContent=sc;
  document.getElementById('aStatWords').textContent=WORDS.length;
  document.getElementById('aStatActive').textContent=ac;
}
async function loadAdminUsers(){
  const div=document.getElementById('adminUsersList');
  let data=[];
  try{const r=await sb.from('profiles').select().order('xp',{ascending:false}).limit(50);data=r.data||[];}catch(e){}
  div.innerHTML=data.length?data.map(u=>`
    <div class="admin-user-row">
      <div class="admin-user-av">${(u.display_name||u.username||'?')[0].toUpperCase()}</div>
      <div>
        <div class="admin-user-name">${u.display_name||u.username}</div>
        <div style="font-size:.72rem;color:var(--muted)">@${u.username} · 🔥${u.streak}</div>
      </div>
      <div class="admin-user-xp">${u.xp} XP · Lv${u.level}</div>
    </div>`).join('')
    :'<p style="color:var(--muted)">İstifadəçi yoxdur.</p>';
}
async function loadAdminStories(){
  const div=document.getElementById('adminStoriesList');
  let data=[];
  try{const r=await sb.from('stories').select().order('created_at',{ascending:false}).limit(50);data=r.data||[];}catch(e){}
  div.innerHTML=data.length?data.map(s=>`
    <div class="story-card">
      <div class="story-meta">
        <div class="story-avatar">${(s.display_name||s.username||'?')[0].toUpperCase()}</div>
        <div class="story-author">${s.display_name||s.username}</div>
        <div class="story-date">${new Date(s.created_at).toLocaleString('az-AZ')}</div>
      </div>
      <div class="story-text">${s.text}</div>
    </div>`).join('')
    :'<p style="color:var(--muted)">Hekayə yoxdur.</p>';
}
async function loadAdminAnnounces(){
  const div=document.getElementById('adminAnnounceList');
  let data=[];
  try{const r=await sb.from('announcements').select().order('created_at',{ascending:false});data=r.data||[];}catch(e){}
  div.innerHTML=data.map(a=>`
    <div class="announce-card ${a.type||'info'}" style="margin-top:10px">
      <div class="announce-title">${a.title}</div>
      <div class="announce-body">${a.content}</div>
      <div class="announce-date">${new Date(a.created_at).toLocaleString('az-AZ')}</div>
    </div>`).join('');
}

// INIT
// ══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',async()=>{
  pickDailyWord();

  // Load login stats
  try{
    let uc=0,sc=0;
    const r1=await sb.from('profiles').select('id',{count:'exact',head:true});if(r1.count!==undefined)uc=r1.count;
    const r2=await sb.from('stories').select('id',{count:'exact',head:true});if(r2.count!==undefined)sc=r2.count;
    document.getElementById('lsUsers').textContent=uc;
    document.getElementById('lsStories').textContent=sc;
  }catch(e){}
  document.getElementById('lsWords').textContent=WORDS.length;

  hideLoading();

  // Login tabs
  document.querySelectorAll('.login-tab').forEach(t=>t.addEventListener('click',function(){
    document.querySelectorAll('.login-tab').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    loginMode=this.dataset.mode;
    document.getElementById('loginBtn').textContent=loginMode==='login'?'🚀 Daxil Ol':'📝 Qeydiyyat';
  }));

  // Login
  document.getElementById('loginBtn').addEventListener('click',doLogin);
  document.getElementById('studentName').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

  // Admin button
  document.getElementById('adminBtn').addEventListener('click',()=>{
    const pass=prompt('Admin şifrəsi:');
    if(pass===ADMIN_PASS)openAdmin();
    else if(pass!==null)showToast('Yanlış şifrə!','red');
  });

  // Nav buttons
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',function(){
    switchView(this.dataset.view);
  }));

  // Avatar → profile
  document.getElementById('avatarBtn').addEventListener('click',()=>switchView('Profile'));

  // Admin logout
  document.getElementById('adminLogoutBtn').addEventListener('click',()=>showScreen('loginScreen'));

  // Admin tabs
  document.querySelectorAll('.admin-tab').forEach(t=>t.addEventListener('click',function(){
    document.querySelectorAll('.admin-tab').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    const tab=this.dataset.atab;
    document.querySelectorAll('[id^="atab-"]').forEach(d=>d.style.display='none');
    document.getElementById('atab-'+tab).style.display='block';
    if(tab==='users')loadAdminUsers();
    if(tab==='stories')loadAdminStories();
    if(tab==='announce')loadAdminAnnounces();
  }));

  // Announce type buttons
  document.querySelectorAll('.type-btn').forEach(b=>b.addEventListener('click',function(){
    document.querySelectorAll('.type-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');announceType=this.dataset.type;
  }));

  // Send announcement
  document.getElementById('aSendBtn').addEventListener('click',async()=>{
    const title=document.getElementById('aTitle').value.trim();
    const content=document.getElementById('aBody').value.trim();
    if(!title||!content){showToast('Başlıq və məzmun daxil edin!','red');return;}
    try{
      await sb.from('announcements').insert([{title,content,type:announceType,created_at:new Date().toISOString()}]);
      document.getElementById('aTitle').value='';document.getElementById('aBody').value='';
      showToast('Duyuru göndərildi!','teal');loadAdminAnnounces();
    }catch(e){showToast('Xəta!','red');}
  });
});
</script>
</body>
